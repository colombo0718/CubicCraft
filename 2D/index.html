<!DOCTYPE html>
<html>
  <head>
    <script src="konva.js"></script>
    <script src="CraftData.js"></script>
    <meta charset="utf-8" />
    <title>COC2D</title>
    <style>
      
      body{
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000000;
      }
      
      #log{
        position: absolute;
        width: 200px;
        bottom: 12px;
        right: 12px;
        padding: .4em .6em;
        font-family: monospace;
        font-size: .85em;
        line-height: 1.6;
        color: #0ff;
        background-color: rgba(0,17,17,0.75);
        border: 1px solid #0ff;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="container" oncontextmenu="return false;"></div>

    <div id="log">
      <div id="log-text"></div>
    </div>

    <script> 

      var buildCraft=function(model){

        var craft = new Konva.Group()
        craft.mass = model.unite.length

        // Compute COM (same formula used by Worker for Rapier body origin)
        var comX = 0, comY = 0
        for(var i=0;i<model.unite.length;i++){ comX+=model.unite[i].x; comY+=model.unite[i].y }
        comX/=craft.mass; comY/=craft.mass
        craft.offsetX(comX); craft.offsetY(comY)

        // Block rendering
        for(var i=0;i<model.unite.length;i++){
          craft.add(new Konva.Rect({
            x:model.unite[i].x, y:model.unite[i].y,
            offsetX:.5, offsetY:.5,
            width:1, height:1,
            fill:model.unite[i].color,
            stroke:'#000000', strokeWidth:.05
          }))
        }

        // Engine flame rendering
        for(var i=0;i<model.engines.length;i++){
          var e=model.engines[i]
          craft.add(new Konva.Line({
            id:'fire', name:e.name,
            x:e.x, y:e.y,
            points:[0,0, e.len/2,.4, 1.5*e.len,0, e.len/2,-.4],
            fill:'#f00', stroke:'black', strokeWidth:0,
            rotation:90*e.dir, closed:true, visible:false
          }))
        }

        craft.jet=function(name,onoff){
          var found=craft.find('.'+name)
          if(found.length>=1) found[0].visible(!!onoff)
        }
        craft._engines=craft.find('#fire')

        // Physics state — updated each step by Worker message handler
        craft.velocity={x:0,y:0}
        craft.spd=0; craft.fac=90; craft.vag=0; craft.rotaVelo=0

        return craft
      }

      var buildPlane=function(x1,y1,x2,y2){

        var plane = new Konva.Group();
        x1*=100;y1*=100;x2*=100;y2*=100;
        // plot x line 
        for(j=y1;j<=y2;j+=10){
          if(j%100==0){color="#0a0"}
          else{color="#050"}  

          var line = new Konva.Line({
            points: [x1,j,x2,j],
            stroke: color,
            strokeWidth: .2,

          });
          plane.add(line)
        }
        // plot y line
        for(i=x1;i<=x2;i+=10){
          if(i%100==0){color="#0a0"}
          else{color="#050"} 

          var line = new Konva.Line({
            points: [i,y1,i,y2],
            stroke: color,
            strokeWidth: .2,

          });
          plane.add(line)
        } 

        return plane;
      }

      var route_sample={
        type:"route",
        spot:[
          {ord:0,x: 0,y:  0,fac: 90,vag: 0,stl:0},//p 
          {ord:1,x: 0,y: 50,fac: 90,vag: 0,stl:0},//pf
          {ord:2,x: 0,y:100,fac: 90,vag:60,stl:0},//p v
          {ord:2,x: 0,y:150,fac: 90,vag: 0,stl:1},//p s
          {ord:3,x: 0,y:200,fac: 90,vag:30,stl:0},//pfv
          {ord:3,x: 0,y:250,fac:-90,vag: 0,stl:1},//pfs
        ]
      }

      var route_1={
        type:"route",
        spot:[
          {ord:0,x: 0,y:  0,fac: 90,vag: 0,stl:10},//p 
          {ord:0,x: 0,y: 50,fac:180,vag: 0,stl:10},//pf
          {ord:0,x: 0,y:100,fac: 90,vag:60,stl:10},//p v
          {ord:0,x: 0,y:150,fac: 90,vag: 0,stl: 0},//p s
          {ord:0,x: 0,y:200,fac: 90,vag:30,stl:10},//pfv
          {ord:0,x: 0,y:250,fac:-90,vag: 0,stl: 0},//pfs
        ]
      }

      var route_2={
        type:"route",
        spot:[
          {ord:0,x:  0,y:  0,fac: 90,vag: 0,stl:10},//p 
          {ord:0,x:  0,y: 50,fac:180,vag: 0,stl:10},//pf
          {ord:0,x: 50,y:100,fac: 90,vag:60,stl:10},//p v
          {ord:0,x:-50,y:150,fac: 90,vag: 0,stl: 0},//p s
          {ord:0,x: 50,y:200,fac: 90,vag:30,stl:10},//pfv
          {ord:0,x:-50,y:250,fac:-90,vag: 0,stl: 0},//pfs
          {ord:0,x:  0,y:300,fac:-90,vag: 0,stl: 0}
        ]
      }


      var buildRunway=function(route){
        var runway=new Konva.Group()
        runway.checkpoint=[]

        for(var i=0;i<route.spot.length;i++){

          runway.checkpoint[i]=new Konva.Group({
            x:route.spot[i].x,
            y:route.spot[i].y,
          })

          runway.checkpoint[i].ord=route.spot[i].ord
          var yellowCircle = new Konva.Circle({
            radius: 3,
            stroke: '#ff0',
            strokeWidth: .5,
          });

          runway.checkpoint[i].fac=route.spot[i].fac
          var redArrow = new Konva.Line({
            points: [4,2, 10,0, 4,-2, 4,2],
            stroke: '#ff0',
            strokeWidth: .5,
            rotation:route.spot[i].fac
          });

          runway.checkpoint[i].vag=route.spot[i].vag
          var blueArc = new Konva.Arc({
            innerRadius: 4,
            outerRadius: 8,
            angle: 30,
            stroke: '#ff0',
            strokeWidth: .5,
            rotation:route.spot[i].vag-15
          });

          runway.checkpoint[i].stl=route.spot[i].stl
          var whiteHexagon = new Konva.RegularPolygon({
            sides: 6,
            radius:6 ,
            stroke: '#ff0',
            strokeWidth: .5
          });

          if(route.spot[i].ord==1){
            runway.checkpoint[i].add(redArrow)
          }else if(route.spot[i].ord==2){
            if(route.spot[i].stl==1){
              runway.checkpoint[i].add(whiteHexagon)
            }else{
              runway.checkpoint[i].add(blueArc)
            }
          }else if(route.spot[i].ord==3){
            runway.checkpoint[i].add(redArrow)           
            if(route.spot[i].stl==1){
              runway.checkpoint[i].add(whiteHexagon)
            }else{
              runway.checkpoint[i].add(blueArc)
            }  
          }
          runway.checkpoint[i].add(yellowCircle)
          runway.add(runway.checkpoint[i])          
        }

        runway.check=function(i,craft,err){
          err=err||1
          var dx=craft.x()-runway.checkpoint[i].x()
          var dy=craft.y()-runway.checkpoint[i].y()
          var posGap=Math.sqrt(dx*dx+dy*dy)
          var facGap=runway.checkpoint[i].fac-craft.fac
          var vagGap=runway.checkpoint[i].vag-craft.vag
          if(posGap>3*err){return false}

          switch(runway.checkpoint[i].ord){
          case 1:
            if(facGap>10*err){return false}
            break;

          case 2:
            if(route.spot[i].stl==1){
              if(craft.spd>err){return false}
            }else{
              if(vagGap>10*err){return false}
            }
            break;

          case 3:
            if(facGap>10*err){return false}
            if(route.spot[i].stl==1){
              if(craft.spd>err){return false}
            }else{
              if(vagGap>10*err){return false}
            }
            break;
          }

          return true 
        }

        // runway.guideLine=new Konva.Group({name:"guideline"})
        
        // Build guide line once; update only the first segment each frame
        runway._guideLeadLine = new Konva.Line({stroke:'#ff0', strokeWidth:.2, points:[0,0,0,0]})
        runway._guideStaticLines = []
        runway._guideCp = -1
        runway.guideLine = new Konva.Group({name:"guideline"})
        runway.guideLine.add(runway._guideLeadLine)
        runway.add(runway.guideLine)

        runway.plotGuideLine=function(craft,p){
          // Rebuild static segment lines only when checkpoint index changes
          if(p !== runway._guideCp){
            runway._guideCp = p
            runway._guideStaticLines.forEach(function(l){l.destroy()})
            runway._guideStaticLines = []
            for(var i=p;i<runway.checkpoint.length-1;i++){
              var sl=new Konva.Line({
                points:[runway.checkpoint[i].x(),runway.checkpoint[i].y(),
                        runway.checkpoint[i+1].x(),runway.checkpoint[i+1].y()],
                stroke:'#ff0', strokeWidth:.2,
              })
              runway._guideStaticLines.push(sl)
              runway.guideLine.add(sl)
            }
          }
          // Update only the moving segment (craft → next checkpoint)
          runway._guideLeadLine.points([craft.x(),craft.y(),
            runway.checkpoint[p].x(),runway.checkpoint[p].y()])
        }

        runway.orbitLine=new Konva.Group()
        runway.add(runway.orbitLine)
        runway.i=0
        runway.plotOrbitLine=function(craft){
          runway.i+=1
          if(runway.i==10){runway.i=0}
          if(runway.i!=0){return 0}
          // console.log('dot')
          var dot=new Konva.Circle({
            x:craft.x(),
            y:craft.y(),
            radius: .2,
            stroke: '#0ff',
            strokeWidth: .1,
          })
          runway.orbitLine.add(dot)

          // runway.prevX=craft.x()
          // runway.prevY=craft.y()
        }

        return runway
      }


      var UI={}

      UI.work=function(){

        UI.mouseReact=function(eve){
          // console.log(eve.pageX,eve.pageY,eve.buttons,eve)
          if(eve.buttons==1){
            space.offsetX(space.offsetX()-eve.movementX/space.scale().x)
            space.offsetY(space.offsetY()+eve.movementY/space.scale().x)
          }
          // if(eve.buttons==2){
          //   field.rotation(field.rotation()-eve.movementX/10)
          // }  
        }
        UI.wheelReact=function(eve){
          if(eve.wheelDelta>0&& space.scale().x<5){
            space.scale({x:space.scale().x+.5 , y:space.scale().y-.5})
          }else if(eve.wheelDelta<0 && space.scale().x>1.5){
            space.scale({x:space.scale().x-.5 , y:space.scale().y+.5})
          }
          console.log(space.scale().x,space.scale().y)
        }
       
        
        UI.keyReact=function(eve){
          // if(UI.keyState['q']==null){}
          // console.log(eve.type,eve.key)
          if(eve.type=='keydown'){UI.keyState[eve.key]=true;}
          if(eve.type=='keyup'){UI.keyState[eve.key]=false;}
        }
        UI.keyState={
          // 'a':false,'b':false,'c':false,
        }
        UI.isPress=function(key){
          return UI.keyState[key]
        }

        document.addEventListener('mousemove',UI.mouseReact)
        document.addEventListener("wheel",UI.wheelReact); 
        document.addEventListener('keydown',UI.keyReact)
        document.addEventListener('keyup',UI.keyReact)

        UI.print=function(cont){
          document.getElementById("log-text").innerHTML=cont
        }
 
      }



      game={}
      game.time=0
      game.progress=0

      game.init=function(){

        var width = window.innerWidth;
        var height = window.innerHeight;

        space = new Konva.Stage({
          container: 'container',
          x: width/2,
          y: height/2,
          width: width,
          height: height,
          scale:{x:6,y:-6}
        });

        field = new Konva.Layer({scale:{x:1,y: 1}});
        space.add(field);

        craft=buildCraft(kernal)
        // craft=buildCraft(double)
        // craft=buildCraft(fighter)

        plane=buildPlane(-2,-1,2,3)

        // runway=buildRunway(route_sample)
        // runway=buildRunway(route_1)
        runway=buildRunway(route_2)

        UI.work()
      }

      game.setup=function(){
        game.time=0.000
        game.progress=0
        field.add(plane)
        field.add(runway)
        field.add(craft)
      }


      // render-only: camera follow, guideline, HUD
      game.renderFrame = function(){
        field.offsetX(craft.x())
        field.offsetY(craft.y())
        var pg = game.progress
        if(pg < runway.checkpoint.length) runway.plotGuideLine(craft, pg)
        UI.print(
          "t&nbsp;&nbsp; "+game.time.toFixed(2)+" s<br>"+
          "pos ("+craft.x().toFixed(1)+", "+craft.y().toFixed(1)+")<br>"+
          "vel ("+craft.velocity.x.toFixed(1)+", "+craft.velocity.y.toFixed(1)+")  "+craft.spd.toFixed(1)+"<br>"+
          "fac "+craft.fac.toFixed(0)+"°&nbsp;&nbsp; ω "+craft.rotaVelo.toFixed(1)+"<br>"+
          "cp&nbsp; "+game.progress+" / "+runway.checkpoint.length
        )
      }

      // Visual jet update only — physics runs in Worker
      game.flash = function(){
        var up, down, left, right
        if(game.rr.active){
          if(game.rr.paused || game.rr.done){
            up=down=left=right=false
          } else {
            var a=game.rr.currentJets
            up=a.up; down=a.down; left=a.left; right=a.right
          }
        } else {
          up=!!UI.isPress('w'); down=!!UI.isPress('s')
          left=!!UI.isPress('a'); right=!!UI.isPress('d')
          physicsWorker.postMessage({type:'setEngines', engines:{up:up,down:down,left:left,right:right}})
        }
        craft.jet('up',up); craft.jet('down',down)
        craft.jet('left',left); craft.jet('right',right)
      }

      game.init()
      game.setup()

      // ===== RR Platform Bridge =====
      game.rr = { active:false, paused:false, sessionId:0, stepsPerAction:5, stepCount:0, maxSteps:5000, rewardAccum:0, done:false, currentJets:{up:false,down:false,left:false,right:false} }

      game.rr.reset = function(){
        physicsWorker.postMessage({type:'reset'})
        craft.x(0); craft.y(0); craft.rotation(0)
        craft.fac=90; craft.vag=0; craft.spd=0
        craft.velocity={x:0,y:0}; craft.rotaVelo=0
        for(var i=0;i<runway.checkpoint.length;i++) runway.checkpoint[i].visible(true)
        game.progress=0; game.time=0; game.rr.stepCount=0
        game.rr.rewardAccum=0; game.rr.done=false
        game.rr.currentJets={up:false,down:false,left:false,right:false}
        runway._guideCp=-1
        craft.jet('up',false); craft.jet('down',false)
        craft.jet('left',false); craft.jet('right',false)
      }

      game.rr.getState = function(){
        var pg  = Math.min(game.progress, runway.checkpoint.length-1)
        var cpx = runway.checkpoint[pg].x()
        var cpy = runway.checkpoint[pg].y()
        var dx  = cpx - craft.x(), dy = cpy - craft.y()
        return [
          craft.x(), craft.y(),
          craft.velocity.x, craft.velocity.y,
          craft.fac, craft.rotaVelo,
          dx, dy, Math.sqrt(dx*dx + dy*dy)
        ]
      }

      // action 0=none 1=up 2=down 3=left 4=right
      var RR_ACTIONS = [
        {up:false, down:false, left:false, right:false},
        {up:true,  down:false, left:false, right:false},
        {up:false, down:true,  left:false, right:false},
        {up:false, down:false, left:true,  right:false},
        {up:false, down:false, left:false, right:true },
      ]

      window.addEventListener('message', function(event){
        var msg = event.data
        if(msg.type === 'questInfo'){
          game.rr.active = true
          game.rr.sessionId = msg.sessionId
          game.rr.reset()
          window.parent.postMessage({
            type:'gameInfo',
            players:[{ stateInfo:[
              {name:'x',     min:-200, max:200, bin:20},
              {name:'y',     min:-50,  max:350, bin:20},
              {name:'vx',    min:-300, max:300, bin:20},
              {name:'vy',    min:-300, max:300, bin:20},
              {name:'angle', min:-360, max:360, bin:20},
              {name:'ω',     min:-50,  max:50,  bin:20},
              {name:'dx_cp', min:-300, max:300, bin:20},
              {name:'dy_cp', min:-300, max:300, bin:20},
              {name:'dist',  min:0,    max:500, bin:20}
            ], actionInfo:[{ type:'switch', level:5, name:['○','↑','↓','←','→'] }] }]
          }, '*')
        }
        if(msg.type === 'action' && !game.rr.paused){
          // 回報上一個 action 期間累積的 reward + 當下 state（物理已持續在跑）
          var isDone = game.rr.done
          window.parent.postMessage({
            type:'reward_state',
            reward: game.rr.rewardAccum,
            state: game.rr.getState(),
            done: isDone,
            sessionId: game.rr.sessionId
          }, '*')
          game.rr.rewardAccum = 0
          if(isDone){ game.rr.reset() }
          // 套用新 action（物理下一幀自動生效）
          game.rr.currentJets = RR_ACTIONS[msg.action] || RR_ACTIONS[0]
        }
        if(msg.type === 'pause') game.rr.paused = !game.rr.paused
        if(msg.type === 'accel') game.rr.stepsPerAction = game.rr.stepsPerAction===5 ? 50 : 5
      })

      // ── Web Worker: hand-rolled physics ──────────────────────────────
      var physicsWorker = new Worker('./physics.worker.js')
      physicsWorker.onerror = function(e){ console.error('worker onerror:', e.message, e.filename, e.lineno) }
      physicsWorker.postMessage({type:'init', craftData:kernal})

      physicsWorker.onmessage = function(event){
        var msg = event.data
        if(msg.type === 'debug'){ console.log('[worker]', msg.msg); return }
        if(msg.type !== 'state') return

        // Update craft visual state from Worker physics output
        craft.x(msg.x); craft.y(msg.y)
        craft.rotation(msg.rotation)
        craft.fac=msg.fac; craft.vag=msg.vag; craft.spd=msg.spd
        craft.velocity={x:msg.vx, y:msg.vy}
        craft.rotaVelo=msg.rotaVelo
        game.time=msg.time

        // Checkpoint detection (runs on every physics state update)
        var pg = game.progress
        if(pg < runway.checkpoint.length && runway.check(pg, craft, 1)){
          runway.checkpoint[pg].visible(false)
          game.progress++
          if(game.rr.active && !game.rr.done){
            game.rr.rewardAccum += 1
            if(game.progress >= runway.checkpoint.length){
              game.rr.rewardAccum += 10
              game.rr.done = true
            }
          }
        }

        // RR step tracking (time penalty + timeout)
        if(game.rr.active && !game.rr.paused && !game.rr.done){
          game.rr.rewardAccum -= 0.01
          game.rr.stepCount++
          if(game.rr.stepCount >= game.rr.maxSteps) game.rr.done = true
        }
      }

      // main rAF loop: jet visuals + render only (physics is in Worker)
      ;(function(){
        function loop(){
          game.flash()
          game.renderFrame()
          space.batchDraw()
          requestAnimationFrame(loop)
        }
        requestAnimationFrame(loop)
      })()
    </script>
  </body>
</html>
